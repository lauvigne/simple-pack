}
def macosVariant = providers.gradleProperty('macosVariant').orElse('silicon')
def sevenZipBinProperty = objects.property(String)
def resolvedSevenZipBin = providers.provider {
    if (!sevenZipBinProperty.present) {
        throw new GradleException("7-Zip has not been resolved yet. Run a task depending on check7zip first.")
    }
    sevenZipBinProperty.get()
}
def distDir = layout.buildDirectory.dir('dist')
def downloadsDir = layout.buildDirectory.dir('downloads')
def tempDir = layout.buildDirectory.dir('tmp')
def sfxModuleFile = providers.gradleProperty('sevenZipSfxModule')
    .flatMap { overridePath ->
        layout.file(providers.provider { project.file(overridePath) })
    }
    .orElse(layout.projectDirectory.file('tools/7z.sfx'))
def macosCodesignIdentity = providers.gradleProperty('macosCodesignIdentity').orElse('-')
def macosCodesignBin = providers.gradleProperty('macosCodesignBin').orElse('codesign')

def capitalizeOs = { String osName -> osName.capitalize() }
def osTaskName = { String prefix, String osName -> "${prefix}${capitalizeOs(osName)}" }
def archiveFileName = { String fileName -> layout.buildDirectory.file("downloads/${fileName}") }
def impactDirFor = { String osName -> layout.buildDirectory.dir("impact-${osName}") }
def scratchDirFor = { String osName -> layout.buildDirectory.dir("tmp/extract-${osName}") }
def currentOsName = System.getProperty('os.name', 'unknown')

def archiReleaseBaseUrl = providers.gradleProperty('archiReleaseBaseUrl')
    .orElse('https://github.com/archimatetool/archi.io/releases/download')

def windowsArchiveNameProvider = appVersion.map { versionValue -> "Archi-Win64-${versionValue}.zip" }
def linuxArchiveNameProvider = appVersion.map { versionValue -> "Archi-Linux64-${versionValue}.tgz" }
def macosArchiveNameProvider = providers.provider {
    def versionValue = appVersion.get()
    def variant = macosVariant.get().toLowerCase(Locale.ROOT)
    switch (variant) {
        case 'silicon':
            return "Archi-Mac-Silicon-${versionValue}.dmg"
        case 'intel':
            return "Archi-Mac-Intel-${versionValue}.dmg"
        default:
            throw new GradleException("Unsupported macosVariant '${variant}'. Use 'silicon' or 'intel'.")
    }
}

def buildReleaseUrl = { Provider<String> archiveNameProvider ->
    providers.provider { "${archiReleaseBaseUrl.get()}/${appVersion.get()}/${archiveNameProvider.get()}" }
}

def textTemplatePatterns = ['README*', '**/README*', '**/*.readme', '**/*.README']
def iniLinesFromProperty = { String propertyName, List<String> defaults ->
    providers.gradleProperty(propertyName)
        .map { raw -> raw.split(/\r?\n/).collect { it.trim() }.findAll { !it.isEmpty() } }
        .orElse(defaults)
}
def iniAssignmentsFromProperty = { String propertyName, Map<String, String> defaults ->
    providers.gradleProperty(propertyName)
        .map { raw -> IniPropertyParsers.parseAssignments(raw, propertyName) }
        .orElse(defaults)
}

